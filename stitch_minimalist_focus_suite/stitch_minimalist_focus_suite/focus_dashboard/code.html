<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Productivity Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#002884",
                        "outline": "#8f706b",
                        "inverse-surface": "#2f3131",
                        "surface-dim": "#dadada",
                        "on-tertiary-container": "#a2b4ff",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-primary-fixed": "#410001",
                        "inverse-primary": "#ffb4a9",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface-container-high": "#e8e8e8",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#920305",
                        "surface": "#f9f9f9",
                        "secondary-fixed": "#e5e2e1",
                        "secondary-container": "#e2dfde",
                        "error-container": "#ffdad6",
                        "secondary": "#5f5e5e",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#0039b3",
                        "primary-fixed": "#ffdad5",
                        "on-surface": "#1a1c1c",
                        "outline-variant": "#e3beb9",
                        "surface-bright": "#f9f9f9",
                        "tertiary-fixed": "#dce1ff",
                        "tertiary-container": "#003bb7",
                        "inverse-on-surface": "#f1f1f1",
                        "on-surface-variant": "#5a403d",
                        "primary-container": "#950606",
                        "on-primary-container": "#ff9d90",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#b7c4ff",
                        "surface-container-highest": "#e2e2e2",
                        "on-tertiary-fixed": "#001551",
                        "surface-variant": "#e2e2e2",
                        "surface-tint": "#b6241b",
                        "on-secondary": "#ffffff",
                        "primary": "#6c0002",
                        "background": "#f9f9f9",
                        "on-secondary-fixed-variant": "#474746",
                        "on-background": "#1a1c1c",
                        "surface-container-low": "#f3f3f3",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#ffb4a9",
                        "surface-container": "#eeeeee",
                        "on-secondary-container": "#636262"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container-max": "1200px",
                        "stack-sm": "12px",
                        "gutter": "24px",
                        "stack-md": "24px",
                        "margin-desktop": "64px",
                        "stack-lg": "48px",
                        "unit": "8px",
                        "margin-mobile": "20px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-xl": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "body-sm": ["Manrope"],
                        "label-md": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-xl": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }]
                    }
                },
            }
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-20 md:pb-0 pt-16">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-surface-container-lowest flex justify-between items-center h-16 px-margin-mobile md:px-margin-desktop border-b border-surface-container dark:border-surface-variant flat no shadows">
<button class="text-primary dark:text-primary-fixed cursor-pointer active:opacity-80 transition-opacity hover:bg-surface-container-low dark:hover:bg-surface-variant p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">October 24, 2023</h1>
<button class="text-primary dark:text-primary-fixed cursor-pointer active:opacity-80 transition-opacity hover:bg-surface-container-low dark:hover:bg-surface-variant p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</header>
<main class="px-margin-mobile py-stack-md max-w-container-max mx-auto space-y-stack-lg">
<!-- Focus Stats Summary -->
<section class="grid grid-cols-2 gap-unit">
<div class="bg-surface-container-lowest border border-surface-container rounded-xl p-stack-md flex flex-col justify-center">
<span class="font-label-md text-label-md text-secondary uppercase tracking-wider mb-stack-sm">Total Focus</span>
<div class="flex items-baseline gap-2 text-primary-container">
<span class="font-headline-xl text-headline-xl">4h</span>
<span class="font-headline-md text-headline-md">20m</span>
</div>
</div>
<div class="bg-surface-container-lowest border border-surface-container rounded-xl p-stack-md flex flex-col justify-center">
<span class="font-label-md text-label-md text-secondary uppercase tracking-wider mb-stack-sm">Sessions</span>
<div class="flex items-baseline gap-2 text-on-surface">
<span class="font-headline-xl text-headline-xl">8</span>
</div>
</div>
</section>
<!-- Weekly Activity Chart Placeholder -->
<section class="bg-surface-container-lowest border border-surface-container rounded-xl p-stack-md">
<h2 class="font-headline-md text-headline-md mb-stack-md">Weekly Activity</h2>
<div class="h-48 flex items-end justify-between gap-2 border-b border-surface-container pb-2">
<!-- Bar Chart Bars -->
<div class="w-full bg-surface-container-highest rounded-t-sm h-12 relative group"><div class="absolute inset-x-0 bottom-0 bg-primary-container rounded-t-sm h-full hidden group-hover:block opacity-20"></div></div>
<div class="w-full bg-surface-container-highest rounded-t-sm h-24 relative group"><div class="absolute inset-x-0 bottom-0 bg-primary-container rounded-t-sm h-full hidden group-hover:block opacity-20"></div></div>
<div class="w-full bg-primary-container rounded-t-sm h-40"></div> <!-- Active Day -->
<div class="w-full bg-surface-container-highest rounded-t-sm h-16 relative group"><div class="absolute inset-x-0 bottom-0 bg-primary-container rounded-t-sm h-full hidden group-hover:block opacity-20"></div></div>
<div class="w-full bg-surface-container-highest rounded-t-sm h-32 relative group"><div class="absolute inset-x-0 bottom-0 bg-primary-container rounded-t-sm h-full hidden group-hover:block opacity-20"></div></div>
<div class="w-full bg-surface-container-highest rounded-t-sm h-8 relative group"><div class="absolute inset-x-0 bottom-0 bg-primary-container rounded-t-sm h-full hidden group-hover:block opacity-20"></div></div>
<div class="w-full bg-surface-container-highest rounded-t-sm h-20 relative group"><div class="absolute inset-x-0 bottom-0 bg-primary-container rounded-t-sm h-full hidden group-hover:block opacity-20"></div></div>
</div>
<div class="flex justify-between mt-2 text-secondary font-label-md text-label-md uppercase">
<span>M</span><span>T</span><span class="text-primary-container">W</span><span>T</span><span>F</span><span>S</span><span>S</span>
</div>
</section>
<!-- Daily Streaks & Achievements -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="bg-surface-container-lowest border border-surface-container rounded-xl p-stack-md">
<div class="flex items-center gap-stack-sm mb-stack-md">
<span class="material-symbols-outlined text-primary-container" data-icon="local_fire_department">local_fire_department</span>
<h2 class="font-headline-md text-headline-md">Daily Streaks</h2>
</div>
<div class="flex items-center justify-center py-stack-lg">
<div class="relative w-32 h-32">
<!-- Simulated Progress Ring -->
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="45" stroke="#F5F5F5" stroke-width="8"></circle>
<circle cx="50" cy="50" fill="none" r="45" stroke="#950606" stroke-dasharray="283" stroke-dashoffset="56" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-headline-lg text-headline-lg text-on-surface">12</span>
<span class="font-label-sm text-label-sm text-secondary uppercase">Days</span>
</div>
</div>
</div>
</div>
<div class="bg-surface-container-lowest border border-surface-container rounded-xl p-stack-md">
<div class="flex items-center gap-stack-sm mb-stack-md">
<span class="material-symbols-outlined text-primary-container" data-icon="trophy">emoji_events</span>
<h2 class="font-headline-md text-headline-md">Recent Achievements</h2>
</div>
<ul class="space-y-stack-sm">
<li class="flex items-center gap-stack-md p-stack-sm rounded-lg hover:bg-surface-container-low transition-colors border-b border-surface-container last:border-0 pb-stack-sm">
<div class="bg-primary-container/10 p-2 rounded-full text-primary-container">
<span class="material-symbols-outlined" data-icon="star">star</span>
</div>
<div>
<p class="font-body-md text-body-md font-medium text-on-surface">Deep Focus Master</p>
<p class="font-body-sm text-body-sm text-secondary">3 hours of uninterrupted focus</p>
</div>
</li>
<li class="flex items-center gap-stack-md p-stack-sm rounded-lg hover:bg-surface-container-low transition-colors border-b border-surface-container last:border-0 pb-stack-sm">
<div class="bg-surface-container-high p-2 rounded-full text-secondary">
<span class="material-symbols-outlined" data-icon="task_alt">task_alt</span>
</div>
<div>
<p class="font-body-md text-body-md font-medium text-on-surface">Task Crusher</p>
<p class="font-body-sm text-body-sm text-secondary">Completed 10 tasks in one day</p>
</div>
</li>
</ul>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fixed bottom-0 w-full z-50 border-t border-surface-container dark:border-surface-variant flat no shadows fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-4 bg-surface dark:bg-surface-container-lowest">
<!-- Assuming Dashboard intent maps to Home/Main if it existed, but using Timer as Active per 3-tab structure or defaulting to Timer if no clear match -->
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed font-bold hover:text-on-surface dark:hover:text-on-surface-variant transition-colors active:scale-95 transition-transform duration-200 w-16">
<span class="material-symbols-outlined mb-1" data-icon="timer">timer</span>
<span class="font-label-sm text-label-sm">Timer</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:text-on-surface dark:hover:text-on-surface-variant transition-colors active:scale-95 transition-transform duration-200 w-16">
<span class="material-symbols-outlined mb-1" data-icon="book_2">book_2</span>
<span class="font-label-sm text-label-sm">Reading</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:text-on-surface dark:hover:text-on-surface-variant transition-colors active:scale-95 transition-transform duration-200 w-16">
<span class="material-symbols-outlined mb-1" data-icon="checklist">checklist</span>
<span class="font-label-sm text-label-sm">Tasks</span>
</button>
</nav>
</body></html>
