<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pomodoro Timer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#5a403d",
                        "on-surface": "#1a1c1c",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-secondary-fixed": "#1c1b1b",
                        "primary": "#6c0002",
                        "surface": "#f9f9f9",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#b7c4ff",
                        "inverse-on-surface": "#f1f1f1",
                        "on-tertiary-fixed": "#001551",
                        "background": "#f9f9f9",
                        "surface-container-high": "#e8e8e8",
                        "surface-container-low": "#f3f3f3",
                        "surface-container-highest": "#e2e2e2",
                        "on-background": "#1a1c1c",
                        "primary-fixed": "#ffdad5",
                        "surface-variant": "#e2e2e2",
                        "surface-bright": "#f9f9f9",
                        "tertiary-fixed": "#dce1ff",
                        "surface-dim": "#dadada",
                        "outline": "#8f706b",
                        "on-primary-container": "#ff9d90",
                        "surface-container": "#eeeeee",
                        "tertiary": "#002884",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#410001",
                        "primary-container": "#950606",
                        "surface-tint": "#b6241b",
                        "on-tertiary-fixed-variant": "#0039b3",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#003bb7",
                        "secondary-fixed": "#e5e2e1",
                        "on-secondary-container": "#636262",
                        "secondary-container": "#e2dfde",
                        "on-secondary-fixed-variant": "#474746",
                        "secondary": "#5f5e5e",
                        "inverse-surface": "#2f3131",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#a2b4ff",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#ffb4a9",
                        "primary-fixed-dim": "#ffb4a9",
                        "outline-variant": "#e3beb9",
                        "on-primary-fixed-variant": "#920305"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container-max": "1200px",
                        "margin-mobile": "20px",
                        "margin-desktop": "64px",
                        "stack-lg": "48px",
                        "stack-md": "24px",
                        "gutter": "24px",
                        "unit": "8px",
                        "stack-sm": "12px"
                    },
                    "fontFamily": {
                        "label-sm": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "body-sm": ["Manrope"],
                        "label-md": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "headline-xl": ["Manrope"]
                    },
                    "fontSize": {
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-xl": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .timer-ring {
            stroke-dasharray: 879;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center relative pb-16">
<!-- Top App Bar Desktop -->
<header class="hidden md:flex fixed top-0 w-full justify-between items-center h-16 px-margin-desktop bg-surface dark:bg-surface-container-lowest z-50">
<div class="flex items-center gap-4 cursor-pointer active:opacity-80 transition-opacity text-primary dark:text-primary-fixed">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</div>
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed text-center">
            October 24, 2023
        </div>
<div class="flex items-center gap-4 cursor-pointer active:opacity-80 transition-opacity text-primary dark:text-primary-fixed">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-container-max px-margin-mobile md:px-margin-desktop flex flex-col items-center justify-center flex-grow mt-16 md:mt-0 fade-in">
<!-- Timer Ring Container -->
<div class="relative w-72 h-72 md:w-96 md:h-96 flex items-center justify-center mb-stack-lg">
<!-- Background Track -->
<svg class="absolute inset-0 w-full h-full transform -rotate-90" viewbox="0 0 300 300">
<circle class="stroke-surface-container" cx="150" cy="150" fill="none" r="140" stroke-linecap="round" stroke-width="8"></circle>
<!-- Progress Track -->
<circle class="stroke-primary-container timer-ring" cx="150" cy="150" fill="none" r="140" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<!-- Time Display -->
<div class="flex flex-col items-center justify-center z-10">
<span class="font-headline-xl text-headline-xl md:text-6xl text-on-surface font-bold tracking-tight">25:00</span>
<span class="font-label-sm text-label-sm text-secondary uppercase mt-2">Focus Session</span>
</div>
</div>
<!-- Controls -->
<div class="flex items-center gap-gutter">
<button class="w-14 h-14 rounded-full border border-outline text-on-surface flex items-center justify-center hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
</button>
<button class="px-8 py-4 bg-primary-container text-on-primary rounded-full font-label-md text-label-md flex items-center gap-2 hover:opacity-90 transition-opacity active:scale-95 shadow-[0_8px_32px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined" data-icon="play_arrow" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                Start Focus
            </button>
<button class="w-14 h-14 rounded-full border border-outline text-on-surface flex items-center justify-center hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</div>
<!-- Session Progress (Bento Style Minor Detail) -->
<div class="mt-stack-lg flex gap-4 w-full max-w-sm">
<div class="flex-1 bg-surface-container-low p-4 rounded-xl flex flex-col items-center justify-center">
<span class="font-label-sm text-label-sm text-secondary">Sessions</span>
<span class="font-headline-md text-headline-md text-on-surface">3/4</span>
</div>
<div class="flex-1 bg-surface-container-low p-4 rounded-xl flex flex-col items-center justify-center">
<span class="font-label-sm text-label-sm text-secondary">Break</span>
<span class="font-headline-md text-headline-md text-on-surface">5m</span>
</div>
</div>
</main>
<!-- Bottom Navigation Bar Mobile -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-4 bg-surface dark:bg-surface-container-lowest">
<!-- Timer (Active) -->
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed font-bold active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" data-icon="timer" data-weight="fill" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-label-md text-label-md">Timer</span>
</button>
<!-- Reading (Inactive) -->
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:text-on-surface dark:hover:text-on-surface-variant transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined mb-1" data-icon="book_2">book_2</span>
<span class="font-label-md text-label-md font-normal">Reading</span>
</button>
<!-- Tasks (Inactive) -->
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:text-on-surface dark:hover:text-on-surface-variant transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined mb-1" data-icon="checklist">checklist</span>
<span class="font-label-md text-label-md font-normal">Tasks</span>
</button>
</nav>
</body></html>
