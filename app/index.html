<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content: without it the Android keyboard overlays
         the viewport, so a sheet sized against the full height (max-h-[85vh]) puts the
         field you're typing in underneath the keyboard. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#f3ece4" />
    <title>ReFocus</title>
  </head>
  <body class="bg-surface text-on-surface antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
